openapi: 3.0.3
info:
  title: API de Pagamentos Multi-Gateway
  description: API para gerenciamento de pagamentos através de múltiplos gateways com sistema de prioridades e RBAC.
  version: 1.0.0
servers:
  - url: http://localhost:3333/api/v1
    description: Servidor Local
paths:
  /login:
    post:
      tags:
        - Autenticação
      summary: Autenticação de Usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  example: Password@123
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Credenciais inválidas
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /transactions:
    post:
      tags:
        - Transações
      summary: Criar Nova Transação
      description: Inicia um processo de pagamento. O sistema tentará processar através do gateway de maior prioridade ativo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transação processada
        '422':
          description: Erro de validação ou processamento
        '429':
          $ref: '#/components/responses/TooManyRequests'

    get:
      tags:
        - Transações
      summary: Listar Transações
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de transações

  /transactions/{id}:
    get:
      tags:
        - Transações
      summary: Buscar Transação por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados da transação

  /transactions/{id}/refund:
    post:
      tags:
        - Transações
      summary: Reembolsar Transação
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reembolso solicitado

  /gateways:
    get:
      tags:
        - Gateways
      summary: Listar Gateways
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de gateways
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /gateways/{id}:
    get:
      tags:
        - Gateways
      summary: Buscar Gateway por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados do gateway
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /gateways/{id}/toggle:
    patch:
      tags:
        - Gateways
      summary: Alternar Status do Gateway (Ativo/Inativo)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Status alterado
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /gateways/{id}/priority:
    patch:
      tags:
        - Gateways
      summary: Atualizar Prioridade do Gateway
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                priority:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Prioridade atualizada
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /products:
    get:
      tags:
        - Produtos
      summary: Listar Produtos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de produtos
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Produtos
      summary: Criar Produto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Produto criado
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /products/{id}:
    get:
      tags:
        - Produtos
      summary: Buscar Produto por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados do produto
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      tags:
        - Produtos
      summary: Atualizar Produto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Produto atualizado
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      tags:
        - Produtos
      summary: Excluir Produto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Produto excluído
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users:
    get:
      tags:
        - Usuários
      summary: Listar Usuários
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuários
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      tags:
        - Usuários
      summary: Criar Usuário
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Usuário criado
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/{id}:
    get:
      tags:
        - Usuários
      summary: Buscar Usuário por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados do usuário
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      tags:
        - Usuários
      summary: Atualizar Usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Usuário atualizado
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      tags:
        - Usuários
      summary: Excluir Usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Usuário excluído
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /clients:
    get:
      tags:
        - Clientes
      summary: Listar Clientes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de clientes
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /clients/{id}:
    get:
      tags:
        - Clientes
      summary: Buscar Cliente por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados do cliente
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /refunds:
    get:
      tags:
        - Reembolsos
      summary: Listar Todos os Reembolsos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de reembolsos
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    TooManyRequests:
      description: Limite de requisições excedido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
  schemas:
    RateLimitError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: RATE_LIMIT_EXCEEDED
            message:
              type: string
              example: Too many requests. Please slow down.
            retryAfter:
              type: integer
              example: 60
              description: Segundos até o reset do limite.
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            type:
              type: string
            token:
              type: string
            abilities:
              type: array
              items:
                type: string
            expiresAt:
              type: string
              format: date-time

    CreateTransactionRequest:
      type: object
      required:
        - client
        - items
        - card
      properties:
        client:
          type: object
          required:
            - name
            - email
          properties:
            name:
              type: string
              example: 'João Silva'
            email:
              type: string
              format: email
              example: 'joao@example.com'
        items:
          type: array
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: integer
                example: 1
              quantity:
                type: integer
                example: 2
        card:
          type: object
          required:
            - number
            - cvv
          properties:
            number:
              type: string
              minLength: 16
              maxLength: 16
              example: '1234567812345678'
            cvv:
              type: string
              minLength: 3
              maxLength: 3
              example: '123'

    ProductRequest:
      type: object
      required:
        - name
        - amount
      properties:
        name:
          type: string
          example: 'Plano Premium'
        amount:
          type: integer
          description: Valor em centavos
          example: 9990

    UserRequest:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, FINANCE, USER]
